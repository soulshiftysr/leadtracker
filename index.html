<body>
<div id="desktop-root">
<div class="app-layout">
  <!-- Collapsible Sidebar -->
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <h1>Client & Cohort Context</h1>
        <span class="tag">Settings & Filters</span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close Sidebar">✕</button>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="section-title">Context</div>
        <div class="sidebar-item-group">
          <div class="sidebar-label-row">
            <label for="clientSel">Client</label>
            <div class="sidebar-action-btns">
              <button class="ghost sm" id="newClient" title="Add Client"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
              <button class="ghost sm" id="renameClient" title="Rename Client"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
              <button class="danger sm" id="delClient" title="Delete Client"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
          </div>
          <select id="clientSel"></select>
        </div>
        <div class="sidebar-item-group">
          <div class="sidebar-label-row">
            <label for="batchSel">Batch</label>
            <div class="sidebar-action-btns">
              <button class="ghost sm" id="newBatch" title="Add Batch"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
              <button class="ghost sm" id="renameBatch" title="Rename Batch"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
              <button class="danger sm" id="delBatch" title="Delete Batch"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
          </div>
          <select id="batchSel"></select>
        </div>
      </div>
      
      <div class="sidebar-section">
        <div class="section-title">Data Administration</div>
        <div class="sidebar-buttons">
          <button class="ghost sm w-100" id="exportBtn">Backup Database ↓</button>
          <button class="ghost sm w-100" id="importBtn">Restore Database ↑</button>
          <input type="file" id="importFile" accept=".json" style="display:none">
        </div>
      </div>
      
      <div class="sidebar-section">
        <div class="section-title">Google Sheets Sync</div>
        <div class="sidebar-buttons">
          <button class="ghost sm w-100" id="syncAllBtn" style="border-color:var(--moss);color:var(--moss);">Sync All Sheets ⟳</button>
        </div>
      </div>
      
      <div class="sidebar-section">
        <div class="section-title">Collaboration</div>
        <div id="firebaseStatusText" class="firebase-status-label">
          <span class="status-indicator"></span> Local Storage Mode
        </div>
        <div id="firebaseErrorDetails" class="firebase-error-box" style="display: none;"></div>
        <div class="sidebar-buttons" style="display:flex; flex-direction:column; gap:6px;">
          <button class="ghost sm w-100" id="firebaseForceSyncBtn" style="border-color:var(--moss);color:var(--moss);display:none;">Upload Local → Cloud</button>
          <button class="ghost sm w-100" id="firebaseDownloadBtn" style="border-color:var(--sky);color:var(--sky);display:none;">Download Cloud → Local</button>
        </div>
      </div>
      
      <div class="sidebar-section instruction-card">
        <p>Leads & webinars per pitching, conversions per batch — matched across the whole journey.</p>
      </div>
    </div>
    
    <div class="sidebar-footer" style="display:flex; flex-direction:column; gap:6px; padding: 12px 16px;">
      <span class="sidebar-version" style="margin-bottom:4px;">Soul Shift v4.2.0</span>
      <button class="ghost sm w-100" id="forceMobileBtn" style="border-color:var(--slate);color:var(--slate);">Mobile Version</button>
      <button class="ghost sm w-100" id="clearVersionBtn" style="border-color:var(--text-soft);color:var(--text-soft);display:none;">Auto-Detect Device</button>
    </div>
  </aside>

  <!-- Main Content Panel -->
  <main class="app-content">
    <header class="app-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
          <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="app-title">Soul Shift - Funnel Tracker</span>
      </div>
      <nav id="nav"></nav>
      <div class="topbar-right">
        <span id="savedFlag" class="status-badge">—</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
          <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </header>
    
    <div class="content-body">
      <div id="storageWarn" style="display:none;background:var(--gold-light);border:1px solid var(--gold);border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--text)"></div>
      <div id="view"></div>
    </div>
  </main>
</div>
</div>
<div id="mobile-root" style="display: none;"></div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div id="auth-root" style="display: none;"></div>

</body>
</html>
